<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Left arm: navy, pill shape rotated ~17° clockwise, top-left to bottom-center -->
  <rect x="-5.5" y="-20" width="11" height="40" rx="5.5"
        fill="#1D3F72"
        transform="translate(18,23.5) rotate(17)"/>
  <!-- Right arm: lime, pill shape rotated ~19° counter-clockwise, top-right to bottom-center (on top) -->
